<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>모돌 백오피스</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">
  <button
    type="button"
    class="hamburger"
    id="hamburger"
    aria-label="메뉴 열기"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <nav class="sidebar" id="sidebar" aria-label="관리 사이드 메뉴">
    <h1>모돌</h1>
    <ul>
      <li data-page="members">멤버 관리</li>
      <li data-page="extension">날떼 연장 관리</li>
      <li data-page="absence">벙 불참 관리</li>
    </ul>
  </nav>

  <main class="content">
    <header class="top-bar">
      <span class="top-bar-spacer" aria-hidden="true"></span>
      <h2 id="page-title" class="page-title">모돌 운영페이지</h2>
      <div class="made-by">
        Created by. <span class="author-name">상큼한토마토</span>
      </div>
    </header>
    <section id="page-content" class="page-content" aria-live="polite"></section>
  </main>
</div>

<div id="password-gate" class="password-gate" aria-live="polite">
  <div
    class="password-gate__dialog"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="password-gate-title"
  >
    <h2 id="password-gate-title">접근 비밀번호</h2>
    <p class="password-gate__copy">
      비밀번호 입력 없이 시스템에 접근할 수 없습니다.
    </p>
    <form id="password-gate-form">
      <label class="sr-only" for="password-gate-input">비밀번호</label>
      <input
        id="password-gate-input"
        type="password"
        autocomplete="current-password"
        placeholder="비밀번호 입력"
        required
        maxlength="64"
      />
      <div class="password-gate__actions">
        <button type="submit">입장</button>
        
      </div>
      <p
        id="password-gate-feedback"
        class="password-gate__feedback"
        role="status"
        aria-live="polite"
      ></p>
    </form>
  </div>
</div>

<div id="loading-mask" class="loading-mask hidden">
  <div class="spinner"></div>
</div>
<div id="toast" class="toast"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
